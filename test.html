<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>do a doodle</title>

    <script type="importmap">
    {
        "imports": {
            "three": "/node_modules/three/build/three.module.js",
            "three/webgpu": "/node_modules/three/build/three.webgpu.js",
            "three/tsl": "/node_modules/three/build/three.tsl.js",
            "three/addons/": "/node_modules/three/examples/jsm/"
        }
    }
    </script>

    <link rel="stylesheet" href="./src/style.css" />
</head>

<body>
    <div id="app">
        <h1>do a doodle</h1>

        <div id="webcam-wrap">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="landmark-canvas"></canvas>
        </div>

        <div id="renderer-container"></div>

        <div id="controls">
            <div class="knob" id="knob-x" data-axis="x"></div>
            <button id="clear-button">shake to clear</button>
            <div class="knob" id="knob-y" data-axis="y"></div>
        </div>
    </div>

    <script type="module" src="./src/doodle.js"></script>
</body>

</html>
