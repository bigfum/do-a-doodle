<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>do a doodle</title>
    <link rel="stylesheet" href="./src/style.css" />
</head>

<body>
    <div id="app">
        <h1>do a doodle</h1>

        <canvas id="doodle-canvas" width="600" height="400"></canvas>

        <div id="controls">
            <div class="knob" id="knob-x" data-axis="x"></div>
            <button id="clear-button">shake to clear</button>
            <div class="knob" id="knob-y" data-axis="y"></div>
        </div>
    </div>

    <script src="./src/doodle.js"></script>
</body>

</html>
